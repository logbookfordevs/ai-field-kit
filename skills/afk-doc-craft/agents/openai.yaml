display_name: AFK Doc Craft
short_description: Write and improve human-facing docs with a reader-first workflow.
default_prompt: "Write or refactor this human-facing documentation using the reader-first playbook: identify the reader and document type, use the relevant reference guidance, create a clear reader journey, and calibrate the tone for the artifact. Do not use for agent-facing instruction surfaces such as AGENTS.md, CLAUDE.md, SKILL.md, prompts, agent rules/policies, or skill content."
