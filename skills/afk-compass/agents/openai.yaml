interface:
  display_name: "AFK Compass"
  short_description: "Route work to the right AFK and companion skills"
  default_prompt: "Use $afk-compass to route broad, ambiguous, multi-phase, or explicit AFK workflow/run requests to the right AFK and companion skills. Re-check routing at phase changes such as source gathering -> PRD/spec, draft -> implementation plan, or plan -> execution. In freestyle prompts, choose the smallest useful next skill without forcing workflow artifacts."
