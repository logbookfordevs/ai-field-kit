interface:
  display_name: "AFK Compass"
  short_description: "Recommend or route to the smallest useful AFK skill"
  default_prompt: "Use $afk-compass for broad, ambiguous, phase-change, artifact-boundary, storage-convention, explicit workflow, Flow, run, AFK Sprint, AFK Turbo, or non-obvious skill-selection requests when the next skill or phase is unclear. If the user asks what to use, recommend the smallest useful skill, reference, or named package and give the exact manual invocation when needed. If the user asks for work to happen, route into the selected skill."
