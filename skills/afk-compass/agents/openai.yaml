interface:
  display_name: "AFK Compass"
  short_description: "Route work through AFK Free Route, Flow, Sprint, or Turbo modes"
  default_prompt: "Use $afk-compass to route broad, ambiguous, multi-phase, explicit AFK workflow, AFK Sprint, or AFK Turbo requests. Free Route selects the smallest useful skill; Flow uses Grill/Grill With Docs before PRD/spec work, $afk-to-prd-spec, $afk-to-issues, and execution tracking; Sprint uses Plannotator plus native /goal with AFK checkpoint packets; Turbo uses Plannotator plus GoalBuddy's local live board. Re-check routing at phase changes and preserve TDD/source/doubt execution discipline."
