interface:
  display_name: "AFK Compass"
  short_description: "Route work to the right AFK and companion skills"
  default_prompt: "Use $afk-compass as the first AFK skill-selection layer when a task may involve planning, docs, implementation, debugging, review, UI, handoff, or workflow coordination. Route to the smallest useful AFK or recommended external skill set, checking ~/.agents/skills/skills.json when the user implies using their installed skill library."
